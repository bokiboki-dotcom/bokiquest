<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>簿記クエ：サクサク成長版 (UI改善＆実績追加版)</title>
    <style>
        :root { 
            --main: #00B1D2; --bg: #F0F4F8; --card: #FFFFFF; 
            --text: #333333; --sub-text: #8899A6; --accent: #FF8C00; 
            --green: #23D084; --tomato: #FF6347; --gold: #FFD700;
        }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Helvetica Neue', Arial, sans-serif; 
            margin: 0; padding: 20px; text-align: center; 
            max-width: 700px; margin-left: auto; margin-right: auto;
            transition: background 0.5s;
        }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .coin-display { font-weight: bold; color: var(--gold); background: #fff8e1; padding: 8px 16px; border-radius: 20px; border: 1px solid #ffe082; font-size: 1.1em;}
        .slot-btn { background: none; border: 1px solid var(--sub-text); color: var(--sub-text); padding: 8px 15px; border-radius: 20px; font-size: 0.9em; cursor: pointer; font-weight: bold;}
        
        /* UIをひろびろと（padding, margin拡大） */
        .card { 
            background: var(--card); border-radius: 24px; padding: 30px; margin-bottom: 25px; 
            box-shadow: 0 6px 16px rgba(0,0,0,0.06); text-align: center; position: relative;
        }
        
        /* ステータス */
        #user-display { font-size: 1.3em; color: var(--text); font-weight: bold; }
        .streak-text { color: var(--accent); font-weight: bold; font-size: 1.1em; margin-bottom: 10px; }
        .custom-title { font-size: 0.9em; color: var(--sub-text); border: 1px solid var(--sub-text); border-radius: 6px; padding: 4px 10px; display: inline-block; margin-bottom: 15px; }
        .char { font-size: 80px; margin: 10px 0; display: block; }
        .lv-text { font-size: 3em; font-weight: bold; color: var(--main); margin: 10px 0;}
        .rank-text { color: var(--sub-text); font-weight: bold; font-size: 1.2em; letter-spacing: 1px; }
        
        /* 経験値バー */
        .exp-bar-bg { background: #E1E8ED; height: 20px; border-radius: 10px; overflow: hidden; margin: 20px 0; }
        .exp-bar-fill { height: 100%; background: linear-gradient(90deg, #00B1D2, #23D084); width: 0%; transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        /* 操作系 */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        button { 
            background: var(--bg); border: 1px solid #E1E8ED; color: var(--text); 
            padding: 15px; border-radius: 14px; cursor: pointer; font-weight: bold; touch-action: manipulation; transition: all 0.1s; font-size: 1em;
        }
        button:active { transform: scale(0.95); background: #E1E8ED; }
        .btn-main { background: var(--main); color: white; border: none; box-shadow: 0 4px 10px rgba(0, 177, 210, 0.3); }
        .btn-main:active { background: #0098B5; }
        .btn-gacha { background: linear-gradient(45deg, #FFD700, #FFA500); color: white; border: none; box-shadow: 0 4px 10px rgba(255, 165, 0, 0.4); text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
        
        .input-group { display: flex; flex: 1; border: 1px solid #E1E8ED; border-radius: 12px; overflow: hidden; background: #fff; }
        .input-group input { flex: 1; padding: 15px; background: transparent; color: var(--text); border: none; font-size: 16px; text-align: center; outline: none; width: 50%; }
        .input-group input:first-child { border-right: 1px solid #E1E8ED; }
        .input-group input:focus { background: #F0F4F8; }
        .input-label { font-size: 0.9em; font-weight: bold; color: var(--sub-text); margin-bottom: 8px; text-align: left; }
        .input-box-wrap { background: #F8FAFC; padding: 20px; border-radius: 16px; border: 1px solid #E1E8ED; margin-bottom: 15px; }

        /* グラフエリア復活 */
        .tab-btn { background: none; border: none; color: var(--sub-text); padding: 8px 20px; border-radius: 20px; margin: 0 5px 20px; font-size: 1em; font-weight: bold; cursor:pointer;}
        .tab-btn.active { background: var(--main); color: white; }
        .graph-area { display: flex; align-items: flex-end; justify-content: space-around; height: 180px; margin-top: 15px; padding-bottom: 5px; border-bottom: 2px solid #E1E8ED; }
        .bar-wrap { display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
        .bar { background: var(--main); border-radius: 6px 6px 0 0; height: 0%; transition: height 0.8s ease-out; }
        .bar-val { font-size: 11px; color: var(--text); margin-bottom: 4px; line-height: 1.1; font-weight: bold; }
        .bar-date { font-size: 11px; color: var(--sub-text); margin-top: 8px; white-space: nowrap; }

        /* ポモドーロフルスクリーン用 */
        .pomo-fullscreen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--tomato) !important; color: white !important; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-sizing: border-box; border-radius: 0 !important; border: none !important;
        }
        .pomo-fullscreen h3, .pomo-fullscreen #pomodoro-status { color: white !important; }
        .pomo-fullscreen #pomodoro-display { font-size: 6em !important; color: white !important; }
        .pomo-fullscreen button { border: 2px solid white; color: white; }
        .combo-text { font-size: 1.2em; color: var(--gold); font-weight: bold; animation: pulse 1s infinite; margin-bottom: 10px; }

        /* モーダル & 演出 */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10000; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
        .modal-card { background: var(--card); padding: 40px 30px; border-radius: 24px; width: 90%; max-width: 450px; box-sizing: border-box; text-align: center; position: relative; overflow: hidden; }
        
        @keyframes levelUpPop { 0% { transform: scale(0.8); opacity: 0; } 50% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .lv-up-anim { animation: levelUpPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
        .sparkle { position: absolute; font-size: 24px; animation: pulse 1s infinite; }

        /* リスト類 */
        .list-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 1em; text-align: left;}
        .badge { background: var(--gold); color: white; padding: 4px 10px; border-radius: 12px; font-size: 0.85em; font-weight: bold; white-space: nowrap; margin-left: 10px;}
    </style>
</head>
<body>

<div class="header-bar">
    <div id="user-display">---</div>
    <div class="coin-display">🪙 <span id="display-coins">0</span></div>
    <button class="slot-btn" onclick="openSlotMenu()">🔁 データ切替</button>
</div>

<div class="card" id="profile-card">
    <div id="display-streak" class="streak-text">🔥 0日連続学習中！</div>
    <div id="display-title" class="custom-title">称号なし</div>
    <span id="display-char" class="char">👤</span>
    <div id="display-rank" class="rank-text">---</div>
    <div class="lv-text">Lv.<span id="display-level">1</span></div>
    
    <div class="exp-bar-bg"><div id="display-bar" class="exp-bar-fill"></div></div>
    <div style="font-size: 0.9em; color: var(--sub-text); font-weight:bold;">
        次まで あと <span id="display-next" style="color:var(--main); font-size: 1.2em;">--</span> XP
    </div>
</div>

<div class="card">
    <h3 style="font-size:1.1em; color:var(--sub-text); margin-top:0; margin-bottom: 15px;">🎯 今週の目標 / 🏆 デイリーミッション</h3>
    <div id="daily-mission-display" style="margin-bottom: 20px; border-bottom: 1px dashed #E1E8ED; padding-bottom: 15px;"></div>
    <div id="weekly-goal-display"></div>
</div>

<div class="card" id="pomo-card" style="border: 2px solid var(--tomato); transition: all 0.3s;">
    <h3 style="font-size:1.1em; color:var(--tomato); margin-top:0;">🍅 ポモドーロタイマー</h3>
    <div id="pomo-combo" class="combo-text" style="display:none;">連続コンボ: x1.0 XP</div>
    <div id="pomodoro-display" style="font-size: 3.5em; font-weight: bold; margin: 15px 0;">25:00</div>
    <div id="pomodoro-status" style="font-size: 1em; color: var(--sub-text); font-weight:bold; margin-bottom: 20px;">📖 学習モード</div>
    <div style="display:flex; gap:15px; justify-content:center;">
        <button class="btn-main" id="btn-pomo-start" style="background:var(--tomato); flex:2;" onclick="togglePomodoro()">スタート</button>
        <button onclick="resetPomodoro()" style="flex:1;">リセット</button>
        <button onclick="toggleFullscreen()" style="flex:1;">全画面</button>
    </div>
</div>

<div class="btn-grid">
    <button class="btn-gacha" onclick="openGacha()">🎰 ガチャを引く (100🪙)</button>
    <button onclick="openInventory()">🎒 もちもの・着せ替え</button>
</div>

<div class="card">
    <h3 style="font-size:1.1em; color:var(--sub-text); text-align:left; margin-top:0; margin-bottom:15px;">📝 記録をつける</h3>
    
    <div class="input-box-wrap">
        <div class="input-label">⏱️ 勉強時間で記録 (1分 = 1XP)</div>
        <div style="display:flex; gap:15px;">
            <div class="input-group" style="margin-bottom:0;">
                <input type="number" id="input-hours" placeholder="時間" min="0">
                <input type="number" id="input-minutes" placeholder="分" min="0" max="59">
            </div>
            <button class="btn-main" onclick="gainTime()">記録</button>
        </div>
    </div>

    <div class="input-box-wrap">
        <div class="input-label">📋 タスク数で記録 (1タスク = 10XP)</div>
        <div style="display:flex; gap:15px;">
            <div class="input-group" style="margin-bottom:0;">
                <input type="number" id="input-task-val" placeholder="こなしたタスク回数" min="1" style="width:100%; border-right:none;">
            </div>
            <button class="btn-main" onclick="gainTask()" style="background:var(--green);">記録</button>
        </div>
    </div>
</div>

<div class="card">
    <h3 style="font-size:1.1em; color:var(--sub-text); margin-top:0; margin-bottom: 15px;">📊 勉強の記録</h3>
    <div>
        <button id="tab7" class="tab-btn active" onclick="switchGraph(7)">直近7日</button>
        <button id="tab30" class="tab-btn" onclick="switchGraph(30)">直近30日</button>
    </div>
    <div id="graph-container" class="graph-area"></div>
    <div style="margin-top:25px; font-size:1.1em; color:var(--sub-text); font-weight:bold; display:flex; justify-content:space-between; align-items:center;">
        <button class="slot-btn" onclick="openAchievements()">🏆 実績を見る</button>
        <div>累計: <span id="sum-all" style="color:var(--main); font-size:1.3em;">0時間0分</span></div>
    </div>
</div>

<div id="slot-modal" class="overlay"><div class="modal-card"><h2 style="color:var(--main);">データ選択</h2><div id="slot-list"></div></div></div>
<div id="name-modal" class="overlay"><div class="modal-card"><h2 style="color:var(--main);">新規登録</h2><input type="text" id="user-name-input" placeholder="名前" style="width:100%; padding:15px; margin-bottom:20px; border-radius:12px; border:1px solid #ccc; font-size:1em;"><button class="btn-main" onclick="registerName()" style="width:100%;">始める</button></div></div>
<div id="lv-modal" class="overlay">
    <div class="modal-card lv-up-anim">
        <div class="sparkle" style="top:10%; left:10%;">✨</div><div class="sparkle" style="top:20%; right:10%;">🎉</div>
        <h1 style="color:var(--accent); font-size:2.5em; margin:0;">LEVEL UP!</h1>
        <div id="modal-job" style="font-size:90px; margin: 15px 0;"></div>
        <div id="modal-job-name" style="font-size:1.8em; font-weight:bold;"></div>
        <div style="color:var(--gold); font-size:1.3em; font-weight:bold; margin: 20px 0;">🪙 100コイン獲得！</div>
        <button class="btn-main" onclick="closeModal('lv-modal')" style="width:100%;">次へ</button>
    </div>
</div>
<div id="info-modal" class="overlay"><div class="modal-card"><h2 id="info-title" style="color:var(--main); margin-top:0;"></h2><p id="info-desc" style="font-weight:bold; font-size:1.1em; line-height:1.5;"></p><button class="btn-main" onclick="closeModal('info-modal')" style="width:100%; margin-top:20px;">閉じる</button></div></div>
<div id="inventory-modal" class="overlay"><div class="modal-card" style="max-height:85vh; overflow-y:auto; padding: 20px;"><h2 style="color:var(--main); margin-top:0;">もちもの</h2><div id="inventory-list" style="text-align:left;"></div><button class="btn-main" onclick="closeModal('inventory-modal')" style="width:100%; margin-top:20px;">閉じる</button></div></div>

<script>
    const JOBS = [
        { lv: 1, n: "簿記の赤ちゃん", i: "👶" }, { lv: 5, n: "簿記の初心者", i: "🧒" },
        { lv: 10, n: "簿記学徒", i: "🧑‍🎓" }, { lv: 20, n: "見習い経理", i: "🧑‍💻" },
        { lv: 35, n: "敏腕経理マン", i: "👔" }, { lv: 50, n: "決算の勇者", i: "⚔️" },
        { lv: 70, n: "経理の賢者", i: "🧙" }, { lv: 100,n: "伝説の会計王", i: "👑" }
    ];

    const GACHA_POOL = [
        { id: "bg_dark", type: "bg", name: "背景: ダークナイト", val: "#1A202C", rarity: "R" },
        { id: "bg_sakura", type: "bg", name: "背景: サクラ", val: "#FFF0F5", rarity: "SR" },
        { id: "bg_gold", type: "bg", name: "背景: ゴールド", val: "#FFF8E1", rarity: "SR" },
        { id: "t_hardworker", type: "title", name: "称号: 努力の天才", val: "努力の天才", rarity: "R" },
        { id: "t_sleepless", type: "title", name: "称号: 不眠不休", val: "不眠不休", rarity: "SR" },
        { id: "t_god", type: "title", name: "称号: 会計神", val: "会計神", rarity: "SSR" },
        { id: "i_dog", type: "icon", name: "キャラ: イヌ", val: "🐶", rarity: "R" },
        { id: "i_cat", type: "icon", name: "キャラ: ネコ", val: "🐱", rarity: "R" },
        { id: "i_robot", type: "icon", name: "キャラ: ロボ", val: "🤖", rarity: "SR" },
        { id: "i_dragon", type: "icon", name: "キャラ: ドラゴン", val: "🐉", rarity: "SSR" }
    ];

    // 実績を大量追加
    const ACHIEVEMENTS = [
        { id: "a1", name: "第一歩", desc: "初めて学習を記録する", condition: (u) => u.xp > 0 },
        { id: "a2", name: "努力家", desc: "累計学習時間が10時間(600XP)突破", condition: (u) => u.xp >= 600 },
        { id: "a3", name: "継続の鬼", desc: "7日連続学習", condition: (u) => u.streak >= 7 },
        { id: "a4", name: "ポモドーロ職人", desc: "ポモドーロを累計10回完了", condition: (u) => u.stats.pomo >= 10 },
        { id: "a5", name: "タスク処理班", desc: "タスクを累計50回こなす", condition: (u) => u.stats.tasks >= 50 },
        { id: "a6", name: "運試し", desc: "ガチャを累計5回引く", condition: (u) => u.stats.gacha >= 5 },
        { id: "a7", name: "月間皆勤賞", desc: "30日連続学習", condition: (u) => u.streak >= 30 },
        { id: "a8", name: "百戦錬磨", desc: "累計学習時間が100時間(6000XP)突破", condition: (u) => u.xp >= 6000 },
        { id: "a9", name: "神への道", desc: "レベル50に到達する", condition: (u) => getLevelInfo(u.xp).lv >= 50 }
    ];

    let appState = JSON.parse(localStorage.getItem('boki_v9_wide')) || {
        slots: [{ id: 0 }, { id: 1 }, { id: 2 }], currentSlot: -1
    };

    let currentUser = null;
    let currentTab = 7; // グラフ用
    let pomoInterval = null;
    let pomoTime = 25 * 60; 
    let pomoMode = 'study'; 
    let isPomoRunning = false;
    let isFullscreen = false;
    let pomoCombo = 0; 

    /* ==== ユーティリティ ==== */
    function getLevelInfo(xp) {
        let lv = 1, needed = 10, tempXP = xp;
        while (tempXP >= needed) { tempXP -= needed; lv++; needed = 10 + Math.floor(Math.pow(lv, 1.5) * 5); }
        return { lv, currentXP: tempXP, nextXP: needed, totalLvXP: xp - tempXP };
    }
    function getJob(lv) { return JOBS.slice().reverse().find(j => lv >= j.lv) || JOBS[0]; }
    function getTodayString() { const d = new Date(); return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`; }
    function formatTime(m) { let h = Math.floor(m / 60); return h > 0 ? `${h}時間${m%60}分` : `${m}分`; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function showInfo(title, desc) { document.getElementById('info-title').innerText=title; document.getElementById('info-desc').innerHTML=desc; document.getElementById('info-modal').style.display='flex'; }

    /* ==== 初期化とデータ移行 ==== */
    function initUserTemplate(user) {
        if(!user.xp) user.xp = 0;
        if(!user.coins) user.coins = 0;
        if(!user.streak) user.streak = 0;
        if(!user.lastDate) user.lastDate = "";
        if(!user.logs) user.logs = {};
        if(!user.inventory) user.inventory = [];
        if(!user.equipped) user.equipped = { bg: "", title: "", icon: "" };
        if(!user.achievements) user.achievements = [];
        if(!user.weeklyGoal) user.weeklyGoal = { type: 'study', val: 0, progress: 0 };
        if(!user.dailyMission) user.dailyMission = { date: "", target: 30, progress: 0, cleared: false };
        if(!user.stats) user.stats = { pomo: 0, gacha: 0, tasks: 0 }; // 実績用統計データ追加
    }

    function openSlotMenu() {
        const list = document.getElementById('slot-list'); list.innerHTML = '';
        appState.slots.forEach((slot, idx) => {
            const div = document.createElement('div'); div.className = 'list-item';
            div.style.cursor = 'pointer';
            if (slot.name) {
                initUserTemplate(slot);
                const info = getLevelInfo(slot.xp);
                div.innerHTML = `<div>DATA ${idx+1}: <b>${slot.name}</b><br><small style="color:var(--sub-text)">Lv.${info.lv} / 🔥 ${slot.streak}日</small></div>`;
            } else { div.innerHTML = `DATA ${idx+1}: 空きスロット`; }
            div.onclick = () => selectSlot(idx);
            list.appendChild(div);
        });
        document.getElementById('slot-modal').style.display = 'flex';
    }

    function selectSlot(idx) {
        appState.currentSlot = idx; currentUser = appState.slots[idx];
        closeModal('slot-modal');
        if (!currentUser.name) { document.getElementById('name-modal').style.display = 'flex'; } 
        else { initUserTemplate(currentUser); checkDailyLogin(); refreshUI(); }
    }

    function registerName() {
        const name = document.getElementById('user-name-input').value;
        if (name) { currentUser.name = name; initUserTemplate(currentUser); checkDailyLogin(); closeModal('name-modal'); saveData(); refreshUI(); }
    }

    function checkDailyLogin() {
        const today = getTodayString();
        if (currentUser.lastDate !== today) {
            if (currentUser.lastDate) {
                const gap = (new Date(today) - new Date(currentUser.lastDate)) / 86400000;
                if (gap > 1) {
                    currentUser.streak = 0;
                    const currentLvInfo = getLevelInfo(currentUser.xp);
                    if (currentLvInfo.lv > 1) {
                        currentUser.xp = currentLvInfo.totalLvXP; 
                        setTimeout(() => showInfo("💔 レベルダウン...", "サボってしまったため、経験値が少し減ってしまいました。\n今日からまた頑張りましょう！"), 500);
                    }
                } else if (gap === 1) { currentUser.streak++; }
            } else { currentUser.streak = 1; }
            
            currentUser.coins += 10;
            currentUser.lastDate = today;
            pomoCombo = 0;
            setTimeout(() => alert("🎁 ログインボーナス！ 10コイン獲得！"), 100);

            currentUser.dailyMission = { date: today, target: Math.floor(Math.random()*30)+20, progress: 0, cleared: false };
        }
        saveData();
    }

    /* ==== コア機能（経験値・実績） ==== */
    function gainXP(amount, type) {
        let multiplier = 1 + (pomoCombo * 0.1); 
        let finalAmount = Math.floor(amount * multiplier);

        const oldLv = getLevelInfo(currentUser.xp).lv;
        currentUser.xp += finalAmount;
        currentUser.logs[getTodayString()] = (currentUser.logs[getTodayString()] || 0) + finalAmount;

        if (currentUser.weeklyGoal && currentUser.weeklyGoal.type === type) { currentUser.weeklyGoal.progress += amount; }
        if (currentUser.dailyMission && !currentUser.dailyMission.cleared) {
            currentUser.dailyMission.progress += amount;
            if (currentUser.dailyMission.progress >= currentUser.dailyMission.target) {
                currentUser.dailyMission.cleared = true;
                currentUser.coins += 20;
                setTimeout(() => showInfo("🏆 デイリークリア！", "20コイン獲得しました！"), 300);
            }
        }

        checkAchievements();
        saveData();
        
        let msg = `${finalAmount} XP獲得！`;
        if (multiplier > 1) msg = `🔥 コンボボーナス(x${multiplier.toFixed(1)})\n` + msg;
        alert(msg);

        const newLv = getLevelInfo(currentUser.xp).lv;
        if (newLv > oldLv) {
            currentUser.coins += 100; saveData();
            document.getElementById('modal-job').innerText = getJob(newLv).i;
            document.getElementById('modal-job-name').innerText = getJob(newLv).n;
            document.getElementById('lv-modal').style.display = 'flex';
        }
        refreshUI();
    }

    // 分かりやすくなった入力機能
    function gainTime() {
        const h = parseInt(document.getElementById('input-hours').value) || 0;
        const m = parseInt(document.getElementById('input-minutes').value) || 0;
        const val = (h * 60) + m;
        if (val > 0) { 
            gainXP(val, 'study'); 
            document.getElementById('input-hours').value = '';
            document.getElementById('input-minutes').value = '';
        }
    }

    function gainTask() {
        const tasks = parseInt(document.getElementById('input-task-val').value) || 0;
        if (tasks > 0) { 
            currentUser.stats.tasks += tasks; // 統計加算
            gainXP(tasks * 10, 'task'); // 1タスク = 10XP
            document.getElementById('input-task-val').value = '';
        }
    }

    function checkAchievements() {
        ACHIEVEMENTS.forEach(ach => {
            if (!currentUser.achievements.includes(ach.id) && ach.condition(currentUser)) {
                currentUser.achievements.push(ach.id);
                currentUser.coins += 50;
                setTimeout(() => showInfo("🏆 実績解除！", `「${ach.name}」を達成！\n報酬: 50コイン`), 800);
            }
        });
    }

    /* ==== ガチャと装備 ==== */
    function openGacha() {
        if (currentUser.coins < 100) return alert("コインが足りません (100🪙必要)");
        currentUser.coins -= 100;
        currentUser.stats.gacha++; // 統計加算
        const item = GACHA_POOL[Math.floor(Math.random() * GACHA_POOL.length)];
        if (!currentUser.inventory.includes(item.id)) {
            currentUser.inventory.push(item.id);
            showInfo("🎰 ガチャ結果", `【${item.rarity}】${item.name} をゲットしました！`);
        } else {
            currentUser.coins += 30; 
            showInfo("🎰 ガチャ結果", `【${item.rarity}】${item.name}\n(既に持っているため30🪙に変換されました)`);
        }
        checkAchievements(); saveData(); refreshUI();
    }

    function openInventory() {
        const list = document.getElementById('inventory-list'); list.innerHTML = '';
        currentUser.inventory.forEach(id => {
            const item = GACHA_POOL.find(g => g.id === id);
            const div = document.createElement('div'); div.className = 'list-item';
            div.innerHTML = `<div><span style="color:var(--accent); font-weight:bold; font-size:0.8em;">[${item.rarity}]</span> ${item.name}</div> <button class="slot-btn" onclick="equipItem('${item.id}', '${item.type}', '${item.val}')">装備</button>`;
            list.appendChild(div);
        });
        if(currentUser.inventory.length===0) list.innerHTML = "<p>アイテムがありません</p>";
        document.getElementById('inventory-modal').style.display = 'flex';
    }

    function equipItem(id, type, val) {
        currentUser.equipped[type] = val; saveData(); refreshUI(); closeModal('inventory-modal');
        alert("装備しました！");
    }

    /* ==== ポモドーロ ==== */
    function toggleFullscreen() {
        isFullscreen = !isFullscreen;
        const card = document.getElementById('pomo-card');
        card.className = isFullscreen ? 'card pomo-fullscreen' : 'card';
    }

    function togglePomodoro() {
        const btn = document.getElementById('btn-pomo-start');
        if (isPomoRunning) {
            clearInterval(pomoInterval); isPomoRunning = false; btn.innerText = "再開"; pomoCombo = 0; 
            document.getElementById('pomo-combo').style.display = 'none';
        } else {
            isPomoRunning = true; btn.innerText = "一時停止";
            document.getElementById('pomo-combo').style.display = 'block';
            document.getElementById('pomo-combo').innerText = `🔥 連続コンボ: x${(1 + pomoCombo * 0.1).toFixed(1)}`;
            
            pomoInterval = setInterval(() => {
                pomoTime--;
                if (pomoTime <= 0) {
                    clearInterval(pomoInterval); isPomoRunning = false;
                    if (pomoMode === 'study') {
                        alert("🍅 25分完了！\n30XP記録します！次は休憩です。");
                        currentUser.stats.pomo++; // 統計加算
                        gainXP(30, 'study');
                        pomoCombo++; 
                        pomoMode = 'break'; pomoTime = 6 * 60; btn.innerText = "休憩スタート";
                        document.getElementById('pomodoro-status').innerText = "☕ 休憩モード";
                    } else {
                        alert("☕ 休憩終了！\n次の学習へ！");
                        pomoMode = 'study'; pomoTime = 25 * 60; btn.innerText = "学習スタート";
                        document.getElementById('pomodoro-status').innerText = "📖 学習モード";
                    }
                }
                let m = Math.floor(pomoTime / 60).toString().padStart(2, '0');
                let s = (pomoTime % 60).toString().padStart(2, '0');
                document.getElementById('pomodoro-display').innerText = `${m}:${s}`;
            }, 1000);
        }
    }
    function resetPomodoro() {
        clearInterval(pomoInterval); isPomoRunning = false; pomoMode = 'study'; pomoTime = 25 * 60; pomoCombo = 0;
        document.getElementById('pomodoro-display').innerText = "25:00";
        document.getElementById('btn-pomo-start').innerText = "スタート";
        document.getElementById('pomo-combo').style.display = 'none';
    }

    /* ==== 週間目標・グラフ描画 ==== */
    function setWeeklyGoal() {
        const val = parseInt(document.getElementById('w-val').value);
        const type = document.getElementById('w-type').value;
        if(val > 0) { currentUser.weeklyGoal = { type, val, progress: 0 }; saveData(); refreshUI(); }
    }

    function switchGraph(type) {
        currentTab = type;
        document.getElementById('tab7').className = type === 7 ? 'tab-btn active' : 'tab-btn';
        document.getElementById('tab30').className = type === 30 ? 'tab-btn active' : 'tab-btn';
        renderGraph();
    }

    function renderGraph() {
        const container = document.getElementById('graph-container');
        container.innerHTML = '';
        let dataEntries = [];
        
        for (let i = currentTab - 1; i >= 0; i--) {
            const d = new Date(); d.setDate(d.getDate() - i);
            const key = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
            dataEntries.push({ label: `${d.getMonth()+1}/${d.getDate()}`, val: currentUser.logs[key] || 0 });
        }

        const maxVal = Math.max(...dataEntries.map(e => e.val), 30); 
        const barWidth = currentTab === 7 ? '70%' : '80%';
        const wrapWidth = currentTab === 7 ? '14%' : `${100/30}%`;
        const isDense = currentTab === 30;

        dataEntries.forEach((entry, i) => {
            const h = (entry.val / maxVal) * 100;
            const wrap = document.createElement('div');
            wrap.className = 'bar-wrap';
            wrap.style.width = wrapWidth;
            
            // 30日表示の時はラベルや値を間引いてスッキリさせる
            const showLabel = !isDense || (i % 5 === 0) || (i === currentTab - 1);
            const labelHtml = showLabel ? `<div class="bar-date" style="${isDense?'font-size:9px; margin-top:4px;':''}">${entry.label}</div>` : `<div class="bar-date"></div>`;
            const valHtml = (!isDense && entry.val > 0) ? `<div class="bar-val">${formatTime(entry.val)}</div>` : ``;

            wrap.innerHTML = `${valHtml}<div class="bar" id="b-${i}" style="width:${barWidth};"></div>${labelHtml}`;
            container.appendChild(wrap);
            
            setTimeout(() => { 
                const b = document.getElementById(`b-${i}`);
                if(b) b.style.height = h + "%";
            }, 50 + (i * 10));
        });
    }

    function refreshUI() {
        if (!currentUser) return;
        const info = getLevelInfo(currentUser.xp);
        
        document.body.style.background = currentUser.equipped.bg || 'var(--bg)';
        document.getElementById('display-title').innerText = currentUser.equipped.title || '称号なし';
        document.getElementById('display-char').innerText = currentUser.equipped.icon || getJob(info.lv).i;
        
        document.getElementById('user-display').innerText = currentUser.name;
        document.getElementById('display-coins').innerText = currentUser.coins;
        document.getElementById('display-streak').innerText = currentUser.streak > 0 ? `🔥 ${currentUser.streak}日連続！` : "今日からスタート！";
        document.getElementById('display-level').innerText = info.lv;
        document.getElementById('display-rank').innerText = getJob(info.lv).n;
        document.getElementById('display-next').innerText = info.nextXP - info.currentXP;
        
        setTimeout(() => { document.getElementById('display-bar').style.width = (info.currentXP / info.nextXP * 100) + "%"; }, 50);
        document.getElementById('sum-all').innerText = formatTime(currentUser.xp);

        // デイリーミッション
        const dm = currentUser.dailyMission;
        document.getElementById('daily-mission-display').innerHTML = `
            <div style="font-size:0.95em; font-weight:bold; margin-bottom:5px;">今日のミッション: ${dm.target}XP 稼ぐ</div>
            ${dm.cleared ? '<div class="badge">クリア済✨</div>' : `<div style="font-size:0.85em; color:var(--sub-text);">進捗: ${dm.progress}/${dm.target}XP</div>`}
        `;

        // 週間目標
        const wg = currentUser.weeklyGoal;
        const wgDiv = document.getElementById('weekly-goal-display');
        if (!wg.val) {
            wgDiv.innerHTML = `
                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <div class="input-group" style="margin-bottom:0;">
                        <input type="number" id="w-val" placeholder="目標値">
                        <select id="w-type" style="border:none; padding:10px; background:transparent; font-weight:bold; color:var(--sub-text);"><option value="study">XP</option><option value="task">回</option></select>
                    </div>
                    <button class="btn-main" onclick="setWeeklyGoal()">設定</button>
                </div>
            `;
        } else {
            const pct = Math.min(100, (wg.progress / wg.val) * 100);
            wgDiv.innerHTML = `
                <div style="display:flex; justify-content:space-between; font-size:0.95em; font-weight:bold;">
                    <span>目標: ${wg.val} ${wg.type==='study'?'XP':'回'}</span><span>${wg.progress} 完了</span>
                </div>
                <div class="exp-bar-bg" style="height:14px;"><div class="exp-bar-fill" style="width: ${pct}%;"></div></div>
                <div style="text-align:right;"><button class="slot-btn" onclick="currentUser.weeklyGoal={val:0}; refreshUI();">再設定</button></div>
            `;
        }
        
        renderGraph();
    }

    function openAchievements() {
        let html = "";
        ACHIEVEMENTS.forEach(a => {
            const clr = currentUser.achievements.includes(a.id);
            html += `<div class="list-item" style="color:${clr?'var(--text)':'var(--sub-text)'}">
                <div><b style="font-size:1.1em;">${a.name}</b><br><small>${a.desc}</small></div>
                <div>${clr?'<span class="badge">済</span>':'<span style="font-size:0.8em; font-weight:bold; color:#ccc;">未</span>'}</div>
            </div>`;
        });
        showInfo("🏆 実績一覧", html);
    }

    function saveData() { localStorage.setItem('boki_v9_wide', JSON.stringify(appState)); }

    window.onload = () => {
        if (appState.currentSlot >= 0 && appState.slots[appState.currentSlot].name) { selectSlot(appState.currentSlot); } 
        else { openSlotMenu(); }
    };
</script>
</body>
</html>
