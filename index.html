<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>簿記クエ：アルティメット版</title>
    <style>
        :root { 
            --study: #0088FF; --task: #00C853; --pomo: #E74C3C; --bg: #F4F7F9; 
            --card: #FFFFFF; --text: #2C3E50; --sub: #7F8C8D; --gold: #F1C40F;
        }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Helvetica Neue', Arial, sans-serif; 
            margin: 0; padding: 20px; text-align: center; 
            max-width: 800px; margin-left: auto; margin-right: auto; line-height: 1.6;
        }
        
        .card { 
            background: var(--card); border-radius: 20px; padding: 25px; margin-bottom: 25px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.05); text-align: left; position: relative;
        }
        .card-center { text-align: center; }
        
        h2, h3 { margin-top: 0; color: var(--text); }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        
        /* ヘッダー・ステータス */
        .header-bar { margin-bottom: 20px; }
        .coin-box { font-weight: bold; color: #D4AC0D; background: #FEF9E7; padding: 10px 20px; border-radius: 30px; border: 2px solid #F9E79F; }
        .char { font-size: 80px; margin: 10px 0; display: block; }
        .lv-text { font-size: 2.2em; font-weight: bold; color: var(--study); margin-bottom: 10px;}
        
        /* デイリークエスト */
        .daily-list { background: #F8F9F9; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .daily-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #ccc; font-size: 0.9em; }
        .daily-item:last-child { border-bottom: none; }
        .daily-btn { background: var(--gold); color: #fff; border: none; border-radius: 8px; padding: 4px 10px; cursor: pointer; font-size: 0.8em; font-weight: bold;}
        .daily-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* 入力フォーム */
        .input-wrap { display: flex; gap: 10px; align-items: center; margin-top: 10px; flex-wrap: wrap;}
        input[type="number"], input[type="text"], select { 
            flex: 1; padding: 12px; border: 2px solid #E0E6ED; border-radius: 10px; font-size: 15px; outline: none; min-width: 60px;
        }
        button.action-btn { 
            border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; white-space: nowrap;
        }
        button.action-btn:active { transform: scale(0.95); }
        
        /* グラフエリア */
        .tab-group { display: flex; gap: 5px; margin-bottom: 15px; background: #ECF0F1; padding: 5px; border-radius: 12px; }
        .tab-btn { flex: 1; padding: 8px; border-radius: 8px; background: none; color: var(--sub); cursor: pointer; font-weight: bold; border: none; font-size: 0.85em; }
        .tab-btn.active { background: white; color: var(--text); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .graph-wrapper { display: flex; height: 160px; margin-bottom: 25px; margin-top: 15px; margin-left: 40px; }
        .graph-container { flex: 1; display: flex; align-items: flex-end; justify-content: space-around; border-bottom: 1px solid #E0E6ED; padding-left: 5px; position: relative; }
        .bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; z-index: 1; }
        .bar { width: 60%; border-radius: 4px 4px 0 0; transition: height 0.5s ease; min-height: 2px;}
        .bar-date { font-size: 9px; color: var(--sub); margin-top: 5px; }
        
        /* フレンドリスト */
        .friend-list { max-height: 150px; overflow-y: auto; background: #F8F9F9; border-radius: 10px; padding: 10px; margin-top: 10px;}
        .friend-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #E0E6ED; font-size: 0.9em;}
        .friend-item:last-child { border-bottom: none; }

        /* ポモドーロタイマー */
        #pomo-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: linear-gradient(135deg, #FF416C, #FF4B2B); color: white; 
            z-index: 9999; flex-direction: column; justify-content: center; align-items: center;
        }
        #pomo-time { font-size: 6rem; font-weight: bold; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); }
        #pomo-status { font-size: 2rem; margin-bottom: 20px; }
        #pomo-combo-disp { font-size: 1.2rem; margin-bottom: 40px; font-weight: bold; color: #FFE000; }
        .pomo-cancel { background: rgba(255,255,255,0.2); border: 2px solid white; color: white; padding: 15px 40px; font-size: 1.2rem; border-radius: 30px; cursor: pointer; }

        /* モーダル */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal { background: white; width: 95%; max-width: 500px; border-radius: 20px; padding: 25px; max-height: 80vh; overflow-y: auto; text-align: left; }
    </style>
</head>
<body>

<div class="header-bar flex-between">
    <div style="text-align:left;">
        <div style="font-weight:bold; font-size:1.2em;" id="display-name">---</div>
        <div style="font-size:0.8em; color:var(--sub);" id="display-id">ID: ---</div>
    </div>
    <div class="coin-box">🪙 <span id="display-coins">0</span></div>
</div>

<div class="card card-center">
    <div style="font-size:0.9em; color:var(--sub); border: 1px solid #ccc; padding:4px 12px; border-radius:20px; display:inline-block;" id="display-title">称号なし</div>
    <span id="display-char" class="char">👤</span>
    <div class="lv-text">Lv.<span id="display-level">1</span></div>
    <div id="display-rank" style="color:var(--sub); font-weight:bold;">---</div>
</div>

<div class="card">
    <h3>📜 今日のデイリークエスト</h3>
    <div class="daily-list" id="daily-list"></div>
</div>

<div class="card card-center" style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);">
    <h3 style="color: #D63031; margin-bottom: 5px;">🍅 ポモドーロタイマー</h3>
    <p style="font-size:0.85em; color:#555; margin-top:0;">25分勉強 + 5分休憩<br>完了で<b>30分の記録</b>と経験値GET！連続でボーナスUP！</p>
    <button class="action-btn" style="background:#D63031; width:80%; font-size:1.1em;" onclick="startPomodoro()">タイマーを起動する</button>
</div>

<div class="card" style="border-left: 6px solid var(--study);">
    <h3 style="color:var(--study);">⏱ 勉強時間を直接記録</h3>
    <div class="input-wrap">
        <input type="number" id="in-hour" placeholder="時間" min="0" style="max-width: 80px;"> <span style="font-weight:bold; color:var(--sub);">時間</span>
        <input type="number" id="in-min" placeholder="分" min="0" max="59" style="max-width: 80px;"> <span style="font-weight:bold; color:var(--sub);">分</span>
        <button class="action-btn" style="background:var(--study); flex:1;" onclick="recordStudy()">記録</button>
    </div>
</div>

<div class="card" style="border-left: 6px solid var(--task);">
    <h3 style="color:var(--task);">✅ 具体的なタスクを記録</h3>
    <div class="input-wrap">
        <select id="task-select">
            <option value="30">仕訳 10題 (獲得: 30XP)</option>
            <option value="100">仕訳 30題 (獲得: 100XP)</option>
            <option value="150">問題集 1章分 (獲得: 150XP)</option>
            <option value="300">過去問 1回分 (獲得: 300XP)</option>
            <option value="500">模試 1回分 (獲得: 500XP)</option>
        </select>
        <button class="action-btn" style="background:var(--task);" onclick="recordTask()">完了！</button>
    </div>
</div>

<div class="card">
    <div class="flex-between" style="margin-bottom: 10px;">
        <h3>📊 成長グラフ</h3>
        <div class="tab-group" style="margin:0;">
            <button class="tab-btn active" onclick="setGraphPeriod(7, this)">7日間</button>
            <button class="tab-btn" onclick="setGraphPeriod(30, this)">30日間</button>
            <button class="tab-btn" onclick="setGraphPeriod(999, this)">累計</button>
        </div>
    </div>

    <h4 style="color:var(--study); margin: 0 0 5px 0; font-size: 0.9em;">📖 勉強時間</h4>
    <div class="graph-wrapper">
        <div id="graph-s" class="graph-container"></div>
    </div>

    <h4 style="color:var(--task); margin: 0 0 5px 0; font-size: 0.9em;">📋 タスク実行回数</h4>
    <div class="graph-wrapper" style="height:120px; margin-left: 20px;">
        <div id="graph-t" class="graph-container"></div>
    </div>
</div>

<div class="card">
    <h3>🤝 フレンド</h3>
    <p style="font-size: 0.85em; color: var(--sub); margin-top:0;">友達のIDを登録してライバルを作ろう！</p>
    <div class="input-wrap">
        <input type="text" id="friend-id-in" placeholder="フレンドのIDを入力" style="text-transform: uppercase;">
        <button class="action-btn" style="background:#3498DB;" onclick="addFriend()">登録</button>
    </div>
    <div class="friend-list" id="friend-list"></div>
</div>

<div class="card card-center">
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <button class="action-btn" style="background:linear-gradient(45deg, #F1C40F, #F39C12);" onclick="openGacha()">🎰 ガチャ(100🪙)</button>
        <button class="action-btn" style="background:#95A5A6;" onclick="openModalInv()">🎒 持ち物</button>
        <button class="action-btn" style="background:#9B59B6;" onclick="openModalAch()">🏆 実績一覧</button>
        <button class="action-btn" style="background:#34495E;" onclick="resetData()">データ初期化</button>
    </div>
</div>

<div id="pomo-screen">
    <h2 id="pomo-status">勉強タイム (25分)</h2>
    <h1 id="pomo-time">25:00</h1>
    <div id="pomo-combo-disp">現在のコンボ: 0</div>
    <button class="pomo-cancel" onclick="cancelPomodoro()">中断して戻る</button>
</div>

<div id="modal-inv" class="overlay">
    <div class="modal">
        <h3>🎒 持ち物・着せ替え</h3>
        <div class="tab-group" id="inv-tabs">
            <button class="tab-btn active" onclick="showInv('icon', this)">キャラ</button>
            <button class="tab-btn" onclick="showInv('bg', this)">背景</button>
            <button class="tab-btn" onclick="showInv('title', this)">称号</button>
        </div>
        <div id="inv-list" style="min-height: 150px; margin-bottom:15px;"></div>
        <button class="action-btn" style="background:#7F8C8D; width:100%;" onclick="closeModal('modal-inv')">閉じる</button>
    </div>
</div>

<div id="modal-ach" class="overlay">
    <div class="modal">
        <h3>🏆 実績一覧</h3>
        <div id="ach-list" style="max-height: 60vh; overflow-y: auto;"></div>
        <button class="action-btn" style="background:#7F8C8D; width:100%; margin-top:15px;" onclick="closeModal('modal-ach')">閉じる</button>
    </div>
</div>

<div id="modal-start" class="overlay" style="background:var(--bg);">
    <div class="modal card-center">
        <h2 style="color:var(--study);">簿記クエへようこそ！</h2>
        <input type="text" id="name-in" placeholder="ニックネーム" style="width:80%; padding:10px; margin-bottom:15px;">
        <button class="action-btn" style="background:var(--study); width:80%;" onclick="initUser()">冒険を始める</button>
    </div>
</div>

<script>
// 基本データ
const JOBS = [
    { lv: 1, n: "見習い", i: "👶" }, { lv: 5, n: "初級担当", i: "🧒" },
    { lv: 15, n: "一人前経理", i: "🧑‍💻" }, { lv: 30, n: "ベテラン", i: "🕵️" },
    { lv: 50, n: "財務長官", i: "🧙" }, { lv: 100, n: "伝説の会計神", i: "👑" }
];

const POOL = [
    { id: 'i1', t: 'icon', n: '柴犬', v: '🐕', r: 'R' }, { id: 'i2', t: 'icon', n: '黒猫', v: '🐈‍⬛', r: 'R' },
    { id: 'i3', t: 'icon', n: 'フクロウ', v: '🦉', r: 'SR' }, { id: 'i4', t: 'icon', n: 'ドラゴン', v: '🐉', r: 'SSR' },
    { id: 'b1', t: 'bg', n: 'ミント', v: '#E8F8F5', r: 'R' }, { id: 'b2', t: 'bg', n: 'サンセット', v: '#FDEDEC', r: 'SR' },
    { id: 'b3', t: 'bg', n: '星空', v: '#1A252F', r: 'SSR' },
    { id: 't1', t: 'title', n: '努力の天才', v: '努力の天才', r: 'R' }, { id: 't2', t: 'title', n: '止まらない男', v: '止まらない男', r: 'SR' },
    { id: 't3', t: 'title', n: '神に選ばれし者', v: '神に選ばれし者', r: 'SSR' }
];

const DAILY_TARGETS = [
    { id: 'd_study', desc: "勉強を30分記録する", max: 30, rw: 30 },
    { id: 'd_task', desc: "タスクを2回実行する", max: 2, rw: 30 },
    { id: 'd_pomo', desc: "ポモドーロを1回完了する", max: 1, rw: 50 }
];

// 状態変数
let u = JSON.parse(localStorage.getItem('boki_v5')) || JSON.parse(localStorage.getItem('boki_v4')) || null;
let viewDays = 7;
let pomoTimer = null;
let pomoTimeLeft = 0;
let isPomoBreak = false;

// ユーティリティ
function formatTime(mins) {
    if (mins === 0) return "0分";
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    if (h > 0 && m > 0) return `${h}時間${m}分`;
    if (h > 0) return `${h}時間`;
    return `${m}分`;
}

function getLv(xp) {
    let lv = 1, next = 50;
    while(xp >= next) { xp -= next; lv++; next = Math.floor(next * 1.3); }
    return { lv, cur: xp, next };
}

function getToday() { return new Date().toISOString().split('T')[0]; }
function save() { localStorage.setItem('boki_v5', JSON.stringify(u)); }
function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

// データ修復・統合機能（バグ防止の要）
function fixDataIntegrity() {
    if (!u) return;
    if (!u.logs) u.logs = {};
    if (!u.daily) u.daily = { date: getToday(), p: {}, c: [] };
    if (!u.daily.p) u.daily.p = {};
    if (!Array.isArray(u.daily.c)) u.daily.c = [];
    if (!Array.isArray(u.ach)) u.ach = [];
    if (!Array.isArray(u.friends)) u.friends = [];
    if (!Array.isArray(u.inv)) u.inv = [];
    if (!u.eq) u.eq = { icon:"", bg:"", title:"" };
    if (typeof u.xp !== 'number' || isNaN(u.xp)) u.xp = 0;
    if (typeof u.coins !== 'number' || isNaN(u.coins)) u.coins = 0;
    if (typeof u.pomoCombo !== 'number' || isNaN(u.pomoCombo)) u.pomoCombo = 0;
    
    const correctLv = getLv(u.xp).lv;
    if (!u.lastLv || typeof u.lastLv !== 'number' || isNaN(u.lastLv)) u.lastLv = correctLv;
}

// 統合更新処理
function updateState() {
    fixDataIntegrity();
    checkLevelUp();
    checkAchievements();
    save();
    render();
}

// 初期化処理
function initUser() {
    const n = document.getElementById('name-in').value;
    if(!n) return;
    u = {
        name: n, id: Math.random().toString(36).substr(2, 6).toUpperCase(),
        xp: 0, lastLv: 1, coins: 100, eq: { icon:"", bg:"", title:"" }, inv: [],
        logs: {}, daily: { date: "", p: {}, c: [] }, pomoCombo: 0, ach: [], friends: []
    };
    updateState(); 
    closeModal('modal-start');
}

// 完全リセット
function resetData() {
    if(confirm("本当にデータを初期化しますか？\n（この操作は取り消せません！）")) {
        localStorage.removeItem('boki_v4');
        localStorage.removeItem('boki_v5');
        location.reload();
    }
}

// フレンドシステム
function addFriend() {
    const fid = document.getElementById('friend-id-in').value.trim().toUpperCase();
    if(!fid) return;
    if(fid === u.id) return alert("自分のIDは追加できません");
    if(u.friends.includes(fid)) return alert("すでにフレンドに登録されています");
    
    u.friends.push(fid);
    updateState();
    document.getElementById('friend-id-in').value = "";
    alert(`ID: ${fid} をフレンドに登録しました！`);
}

function renderFriends() {
    const list = document.getElementById('friend-list');
    list.innerHTML = "";
    if(!u.friends || u.friends.length === 0) {
        list.innerHTML = "<div style='color:var(--sub); font-size:0.9em;'>まだフレンドがいません。IDを入力して追加しましょう。</div>";
        return;
    }
    u.friends.forEach(f => {
        list.innerHTML += `<div class="friend-item">
            <span>👤 ID: <b>${f}</b></span>
            <span style="color:var(--sub); font-size:0.8em;">ライバル</span>
        </div>`;
    });
}

// デイリークエスト
function checkDailyReset() {
    const today = getToday();
    if(u.daily.date !== today) {
        u.daily = { date: today, p: { d_study:0, d_task:0, d_pomo:0 }, c: [] };
        u.pomoCombo = 0;
    }
}

function progressDaily(id, val) {
    checkDailyReset();
    u.daily.p[id] = (u.daily.p[id] || 0) + val;
}

function claimDaily(id) {
    const t = DAILY_TARGETS.find(d => d.id === id);
    if(u.daily.p[id] >= t.max && !u.daily.c.includes(id)) {
        u.daily.c.push(id);
        u.xp += t.rw; u.coins += 20;
        alert(`デイリークリア！ ${t.rw}XP と 20🪙 獲得！`);
        updateState();
    }
}

// レベルアップ判定
function checkLevelUp() {
    const newLvInfo = getLv(u.xp);
    if(newLvInfo.lv > u.lastLv) {
        const diff = newLvInfo.lv - u.lastLv;
        const rewardCoins = diff * 50;
        u.coins += rewardCoins;
        u.lastLv = newLvInfo.lv;
        alert(`🎉 ${diff}レベルアップ！ (Lv.${newLvInfo.lv})\nボーナスとして ${rewardCoins}🪙 獲得しました！`);
    }
}

// 実績（トロフィー）システム
function getTotalStudy() { return Object.values(u.logs).reduce((s, l) => s + (l.s || 0), 0); }
function getTotalTask() { return Object.values(u.logs).reduce((s, l) => s + (l.t || 0), 0); }

const ACHIEVEMENTS = [
    { id: 'a1', n: '最初の一歩', desc: '初めて勉強を記録する', cond: () => Object.keys(u.logs).length > 0 },
    { id: 'a2', n: '見習い卒業', desc: 'レベル5に到達する', cond: () => getLv(u.xp).lv >= 5 },
    { id: 'a3', n: '努力の結晶', desc: '累計勉強時間が10時間を超える', cond: () => getTotalStudy() >= 600 },
    { id: 'a4', n: 'タスクマスター', desc: 'タスクを累計10回完了する', cond: () => getTotalTask() >= 10 },
    { id: 'a5', n: 'ポモドーロ職人', desc: 'ポモドーロで3コンボ達成する', cond: () => u.pomoCombo >= 3 }
];

function checkAchievements() {
    let unlocked = false;
    ACHIEVEMENTS.forEach(a => {
        if(!u.ach.includes(a.id) && a.cond()) {
            u.ach.push(a.id);
            u.coins += 100; // 実績解除ボーナス
            unlocked = true;
            alert(`🏆 実績解除！\n「${a.n}」\nボーナスとして 100🪙 獲得！`);
        }
    });
}

function openModalAch() {
    const list = document.getElementById('ach-list');
    list.innerHTML = "";
    ACHIEVEMENTS.forEach(a => {
        const isUnlock = u.ach.includes(a.id);
        list.innerHTML += `<div style="padding: 10px; border-bottom: 1px solid #eee; opacity: ${isUnlock ? 1 : 0.5}">
            <div style="font-weight:bold;">${isUnlock ? '🌟 ' + a.n : '🔒 ？？？'}</div>
            <div style="font-size:0.8em; color:gray;">${isUnlock ? a.desc : '未解除'}</div>
        </div>`;
    });
    openModal('modal-ach');
}


// 記録処理
function recordStudy() {
    const h = parseInt(document.getElementById('in-hour').value) || 0;
    const m = parseInt(document.getElementById('in-min').value) || 0;
    const v = (h * 60) + m;
    
    if (!v || v <= 0) return alert("勉強時間を入力してください");

    const t = getToday();
    if (!u.logs[t]) u.logs[t] = { s: 0, t: 0 };
    
    u.logs[t].s += v; 
    u.xp += v; 
    progressDaily('d_study', v);
    
    document.getElementById('in-hour').value = "";
    document.getElementById('in-min').value = "";
    
    updateState();
    alert(`${formatTime(v)} の勉強を記録しました！`);
}

function recordTask() {
    const sel = document.getElementById('task-select');
    const xpGain = parseInt(sel.value);
    const taskName = sel.options[sel.selectedIndex].text;

    const t = getToday();
    if (!u.logs[t]) u.logs[t] = { s: 0, t: 0 };
    
    u.logs[t].t += 1;
    u.xp += xpGain;
    progressDaily('d_task', 1);
    
    updateState();
    alert(`「${taskName}」を完了！\n${xpGain}XP 獲得しました！`);
}

// ポモドーロタイマー
const POMO_WORK = 25 * 60; 
const POMO_BREAK = 5 * 60;

function startPomodoro() {
    checkDailyReset();
    document.getElementById('pomo-screen').style.display = 'flex';
    document.getElementById('pomo-combo-disp').innerText = `現在のコンボ: ${u.pomoCombo}`;
    document.getElementById('pomo-screen').style.background = 'linear-gradient(135deg, #FF416C, #FF4B2B)';
    isPomoBreak = false;
    pomoTimeLeft = POMO_WORK;
    updatePomoUI();
    
    pomoTimer = setInterval(() => {
        pomoTimeLeft--;
        updatePomoUI();
        if(pomoTimeLeft <= 0) {
            clearInterval(pomoTimer);
            if(!isPomoBreak) startPomoBreak();
            else finishPomoSequence();
        }
    }, 1000); // ※テスト時は 10 に変更すると高速で終わります
}

function startPomoBreak() {
    isPomoBreak = true;
    pomoTimeLeft = POMO_BREAK;
    document.getElementById('pomo-status').innerText = "休憩タイム (5分)";
    document.getElementById('pomo-screen').style.background = 'linear-gradient(135deg, #00C9FF, #92FE9D)';
    alert("25分の勉強お疲れ様！5分の休憩に入ります。");
    
    pomoTimer = setInterval(() => {
        pomoTimeLeft--;
        updatePomoUI();
        if(pomoTimeLeft <= 0) {
            clearInterval(pomoTimer);
            finishPomoSequence();
        }
    }, 1000);
}

function finishPomoSequence() {
    document.getElementById('pomo-screen').style.display = 'none';
    u.pomoCombo++;
    
    const comboBonus = u.pomoCombo * 10; 
    const totalXP = 30 + comboBonus;
    
    alert(`🍅 ポモドーロ完了！\n30分の勉強時間と、ボーナス含め ${totalXP}XP を獲得！\n現在のコンボ: ${u.pomoCombo}`);
    
    const t = getToday();
    if (!u.logs[t]) u.logs[t] = { s: 0, t: 0 };
    
    u.logs[t].s += 30; // 勉強時間に30分追加
    u.xp += totalXP;   // 経験値追加
    
    progressDaily('d_pomo', 1);
    progressDaily('d_study', 30); // デイリーの勉強時間にも反映
    
    updateState();
}

function cancelPomodoro() {
    clearInterval(pomoTimer);
    document.getElementById('pomo-screen').style.display = 'none';
    alert("タイマーを中断しました。記録はされません。");
}

function updatePomoUI() {
    let m = Math.floor(pomoTimeLeft / 60).toString().padStart(2, '0');
    let s = (pomoTimeLeft % 60).toString().padStart(2, '0');
    document.getElementById('pomo-time').innerText = `${m}:${s}`;
}

// ガチャとインベントリ
function openGacha() {
    if(u.coins < 100) return alert("コインが足りません");
    u.coins -= 100;
    
    const rand = Math.random();
    let rarity = 'R';
    if(rand < 0.05) rarity = 'SSR';
    else if(rand < 0.30) rarity = 'SR';
    
    const candidates = POOL.filter(p => p.r === rarity);
    const item = candidates[Math.floor(Math.random() * candidates.length)];
    
    if(!u.inv.includes(item.id)) u.inv.push(item.id);
    else u.coins += 30;
    
    updateState();
    alert(`🎰 ガチャ結果\nレアリティ: ${item.r}\n「${item.n} (${item.v})」を獲得！\n（ダブりの場合は30コイン還元）`);
}

function openModalInv() {
    const firstTab = document.querySelector('#inv-tabs .tab-btn');
    showInv('icon', firstTab);
    openModal('modal-inv');
}

function showInv(type, btn) {
    document.querySelectorAll('#inv-tabs .tab-btn').forEach(t => t.classList.remove('active'));
    if(btn) btn.classList.add('active');

    const list = document.getElementById('inv-list'); list.innerHTML = "";
    const items = POOL.filter(p => p.t === type && u.inv.includes(p.id));
    
    if(items.length === 0) { list.innerHTML = "<p style='text-align:center; color:gray;'>未所持</p>"; return; }
    
    items.forEach(i => {
        list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;">
            <span>[${i.r}] ${i.n} <b>${i.v}</b></span>
            <button class="action-btn" style="padding:5px 15px; background:var(--study);" onclick="equip('${i.t}', '${i.v}')">装備</button>
        </div>`;
    });
}

function equip(t, v) { 
    u.eq[t] = v; 
    updateState(); 
    closeModal('modal-inv'); 
    alert("装備を変更しました！");
}

// グラフ描画
function setGraphPeriod(days, btn) {
    viewDays = days;
    document.querySelectorAll('.tab-group .tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGraphs();
}

function renderGraphs() {
    const sCon = document.getElementById('graph-s'); sCon.innerHTML = "";
    const tCon = document.getElementById('graph-t'); tCon.innerHTML = "";
    
    let dates = [];
    let keys = Object.keys(u.logs).sort();
    
    if (viewDays === 999) {
        dates = keys.slice(-30);
        if(dates.length === 0) dates = [getToday()];
    } else {
        for(let i = viewDays - 1; i >= 0; i--) {
            const d = new Date(); d.setDate(d.getDate() - i);
            dates.push(d.toISOString().split('T')[0]);
        }
    }

    const sVals = dates.map(d => u.logs[d] ? u.logs[d].s : 0);
    const tVals = dates.map(d => u.logs[d] ? u.logs[d].t : 0);
    
    // グラフの天井を計算 (最低でも60分を基準に)
    let maxLogS = Math.max(...sVals, 60); 
    let maxS = 60;
    if(maxLogS > 600) maxS = Math.ceil(maxLogS / 60) * 60; 
    else if(maxLogS > 300) maxS = 600; 
    else if(maxLogS > 180) maxS = 300; 
    else if(maxLogS > 60) maxS = 180;  

    const maxT = Math.max(...tVals, 5); 

    // 勉強時間グラフの基準線
    const markers = [60, 180, 300, 600];
    markers.forEach(m => {
        if (m <= maxS) {
            const hPercent = (m / maxS) * 100;
            sCon.innerHTML += `
            <div style="position: absolute; bottom: ${hPercent}%; left: 0; right: 0; border-bottom: 1px dashed rgba(0,0,0,0.1); z-index: 0;">
                <span style="position: absolute; left: -35px; top: -8px; font-size: 10px; color: var(--sub); font-weight: bold;">${formatTime(m)}</span>
            </div>`;
        }
    });

    // タスクグラフの最大値線
    tCon.innerHTML += `
        <div style="position: absolute; top: 0; left: 0; right: 0; border-bottom: 1px dashed rgba(0,0,0,0.1); z-index: 0;">
            <span style="position: absolute; left: -15px; top: -8px; font-size: 10px; color: var(--sub); font-weight: bold;">${maxT}回</span>
        </div>`;

    // バーの描画
    dates.forEach((d, i) => {
        const showLabel = dates.length <= 7 || i % 5 === 0 || i === dates.length - 1;
        const lbl = showLabel ? d.split('-').slice(1).join('/') : '';
        
        // 勉強時間バー
        const hs = (sVals[i] / maxS) * 100;
        const timeLabel = sVals[i] > 0 ? formatTime(sVals[i]) : "";
        sCon.innerHTML += `
        <div class="bar-wrap">
            <div style="font-size: 9px; color: var(--study); font-weight: bold; margin-bottom: 3px; writing-mode: vertical-rl; text-orientation: mixed;">${timeLabel}</div>
            <div class="bar" style="background:var(--study); height:${hs}%"></div>
            <div class="bar-date">${lbl}</div>
        </div>`;
        
        // タスクバー
        const ht = (tVals[i] / maxT) * 100;
        tCon.innerHTML += `
        <div class="bar-wrap" style="z-index: 1;">
            <div class="bar" style="background:var(--task); height:${ht}%"></div>
            <div class="bar-date">${lbl}</div>
        </div>`;
    });
}

function renderDaily() {
    checkDailyReset();
    const list = document.getElementById('daily-list'); list.innerHTML = "";
    DAILY_TARGETS.forEach(t => {
        const cur = Math.min(u.daily.p[t.id] || 0, t.max);
        const isClear = cur >= t.max;
        const isClaimed = u.daily.c.includes(t.id);
        
        list.innerHTML += `
            <div class="daily-item">
                <div style="flex:1;">
                    <b>${t.desc}</b><br>
                    <span style="color:${isClear ? 'var(--task)' : 'var(--sub)'};">${cur} / ${t.max}</span>
                </div>
                <div>
                    <button class="daily-btn" ${!isClear || isClaimed ? 'disabled' : ''} onclick="claimDaily('${t.id}')">
                        ${isClaimed ? '受取済' : (isClear ? '報酬GET' : '進行中')}
                    </button>
                </div>
            </div>`;
    });
}

// 全体描画
function render() {
    if(!u) { openModal('modal-start'); return; }
    fixDataIntegrity(); // 描画前に必ずデータの整合性をチェック
    
    const lvInfo = getLv(u.xp);
    const job = [...JOBS].reverse().find(j => lvInfo.lv >= j.lv) || JOBS[0];

    document.getElementById('display-name').innerText = u.name;
    document.getElementById('display-id').innerText = `ID: ${u.id}`;
    document.getElementById('display-coins').innerText = u.coins;
    document.getElementById('display-level').innerText = lvInfo.lv;
    document.getElementById('display-rank').innerText = job.n;
    
    document.getElementById('display-char').innerText = u.eq.icon || job.i;
    document.getElementById('display-title').innerText = u.eq.title || "称号なし";
    document.body.style.background = u.eq.bg || "var(--bg)";

    renderDaily();
    renderGraphs();
    renderFriends();
}

window.onload = render;
</script>
